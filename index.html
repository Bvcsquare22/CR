<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Doer x Chicken Republic — Brand Partnership Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
@import url('https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@500,700,800,900&display=swap');

:root {
  --bg: #0D0D0D;
  --cream: #F0EBE1;
  --gold: #D4A843;
  --card: #1A1A1A;
  --card2: #161616;
  --border: #2A2A2A;
  --body: #C5BFB2;
  --muted: #8A8376;
  --cr-red: #D32011;
  --cr-red-dark: #A01A0C;
  --cr-red-light: #E8391F;
  --cr-yellow: #F5C200;
  --cr-white: #FFFFFF;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--cream);
  font-family: 'Cabinet Grotesk', sans-serif;
}

#app { position: fixed; inset: 0; display: flex; flex-direction: column; overflow: hidden; }

#progress-bar { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: #1A1A1A; z-index: 300; }
#progress-fill { height: 100%; background: var(--cr-red); transition: width 0.3s ease; }

#tap-hint {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-size: 10px; letter-spacing: 3px; color: var(--muted);
  z-index: 200; animation: fade-pulse 2s infinite; white-space: nowrap;
}

@keyframes fade-pulse { 0%,100%{opacity:0.3} 50%{opacity:0.9} }
@keyframes float-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes live-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes nudge { 0%,100%{transform:translateX(0)} 50%{transform:translateX(5px)} }
@keyframes float-trophy { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes pulse-glow {
  0%,100%{box-shadow:0 0 0 0 rgba(212,168,67,0.7),0 0 20px rgba(212,168,67,0.25)}
  50%{box-shadow:0 0 0 10px rgba(212,168,67,0),0 0 30px rgba(212,168,67,0.5)}
}
@keyframes pulse-glow-cr {
  0%,100%{box-shadow:0 0 0 0 rgba(211,32,17,0.7),0 0 20px rgba(211,32,17,0.25)}
  50%{box-shadow:0 0 0 10px rgba(211,32,17,0),0 0 30px rgba(211,32,17,0.5)}
}
@keyframes shimmer { 0%{left:-100%} 100%{left:200%} }

#screen { position: fixed; inset: 0; overflow: hidden; }

.scroll-body {
  position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch; padding-bottom: 80px;
}
.scroll-body::-webkit-scrollbar { display: none; }

/* INSIGHT OVERLAY */
#insight-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.82);
  display: flex; align-items: flex-end; justify-content: center;
  padding: 24px 20px;
  animation: insight-in 0.3s ease;
}
@keyframes insight-in { from{opacity:0} to{opacity:1} }

.insight-card {
  background: #111;
  border: 1px solid var(--cr-red);
  border-radius: 20px;
  padding: 22px 20px 18px;
  width: 100%; max-width: 400px;
  position: relative;
}

.insight-brand-bar {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}

.insight-cr-badge {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--cr-red);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: white;
  font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.5px;
  flex-shrink: 0;
}

.insight-x { font-size: 12px; color: var(--muted); font-weight: 700; }

.insight-doer-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; letter-spacing: 3px; color: var(--gold);
}

.insight-eyebrow {
  font-size: 9px; letter-spacing: 3px; color: var(--cr-red);
  font-weight: 800; text-transform: uppercase; margin-bottom: 8px;
}

.insight-body {
  font-size: 14px; color: var(--cream); line-height: 1.6;
  font-weight: 500; margin-bottom: 18px;
}

.insight-body strong { color: var(--cr-yellow); }

.insight-btn {
  width: 100%; padding: 14px;
  background: var(--cr-red); color: white; border: none;
  border-radius: 12px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px; letter-spacing: 2px; cursor: pointer;
}

/* STATUS BAR */
.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px 6px; font-size: 12px; font-weight: 700;
  color: var(--cream); background: var(--bg);
  position: sticky; top: 0; z-index: 10;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(13,13,13,0.97); border-top: 1px solid var(--border);
  display: flex; justify-content: space-around; padding: 10px 0 18px; z-index: 50;
}
.nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--muted); gap: 3px; }
.nav-item.active { color: var(--cr-red); }
.nav-item .icon { font-size: 20px; }

/* CR BRANDED ELEMENTS */
.cr-cta-btn {
  width: 100%; padding: 16px; background: var(--cr-red); color: white; border: none;
  border-radius: 14px; font-family: 'Bebas Neue', sans-serif; font-size: 17px;
  letter-spacing: 2px; cursor: pointer; animation: pulse-glow-cr 2s infinite;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}

/* HOME SCREEN */
.home-content { padding: 4px 16px 100px; overflow-y: auto; }
.home-content::-webkit-scrollbar { display: none; }
.hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; padding:8px 4px; }
.hdr-left { display:flex; align-items:center; gap:14px; }
.h-avatar { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,#D4A843,#b8902f); display:flex; align-items:center; justify-content:center; color:#0D0D0D; font-weight:800; font-size:20px; }
.h-welcome { font-size:17px; color:white; font-weight:700; }
.h-sub { font-size:13px; color:#6b6b6b; font-weight:500; margin-top:2px; }
.h-bell { width:48px; height:48px; border-radius:14px; background:#1a1a1a; display:flex; align-items:center; justify-content:center; color:#888; position:relative; }
.h-bell-badge { position:absolute; top:-2px; right:-2px; background:#ff4444; color:white; font-size:11px; font-weight:800; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid #000; }

.overview-card-h { background:#1a1a1a; border-radius:24px; padding:18px 20px; margin-bottom:16px; border:1px solid #222; }
.ov-label { font-size:14px; color:#888; font-weight:500; margin-bottom:12px; }
.ov-divider { height:1px; background:#2a2a2a; margin-bottom:16px; }
.ov-challenge-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.ov-icon-box { width:52px; height:52px; border-radius:14px; background:#0f0f0f; border:1px solid #2a2a2a; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
.ov-info { flex:1; min-width:0; }
.ov-title { font-size:14px; font-weight:700; color:white; line-height:1.3; margin-bottom:2px; }
.ov-day { font-size:12px; color:#888; font-weight:500; }
.ov-day strong { color:var(--gold); }
.ov-progress-bar-bg { height:4px; background:#2a2a2a; border-radius:2px; margin-bottom:8px; }
.ov-progress-bar-fill { height:100%; background:var(--gold); border-radius:2px; }
.ov-progress-meta { display:flex; justify-content:space-between; font-size:11px; color:#888; font-weight:500; margin-bottom:14px; }

.daily-block-h { background:#1a1a1a; border-radius:24px; padding:18px 18px 20px; margin-bottom:16px; border:1px solid #222; }
.streak-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.streak-icon-bg-h { width:52px; height:52px; border-radius:16px; background:rgba(211,32,17,0.1); display:flex; align-items:center; justify-content:center; border:1px solid rgba(211,32,17,0.2); }
.streak-num-h { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--gold); line-height:1; }
.streak-lbl-top { font-size:11px; color:#888; font-weight:600; text-transform:uppercase; letter-spacing:1.2px; }
.streak-lbl-days { font-size:14px; color:white; font-weight:700; }
.skip-pill-h { display:inline-flex; align-items:center; gap:6px; background:#0f0f0f; border:1px solid #2a2a2a; padding:6px 10px; border-radius:10px; font-size:11px; color:#888; font-weight:600; }
.skip-dots-h { display:flex; gap:3px; }
.skip-dot-h { width:6px; height:6px; border-radius:50%; background:var(--gold); }
.block-div { height:1px; background:linear-gradient(90deg,transparent,#2a2a2a 20%,#2a2a2a 80%,transparent); margin-bottom:14px; }
.ch-subhdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.ch-title { font-size:15px; color:white; font-weight:800; }
.live-pill-h { display:inline-flex; align-items:center; gap:5px; background:rgba(212,168,67,0.12); padding:3px 7px; border-radius:5px; font-family:'Bebas Neue',sans-serif; font-size:9px; color:var(--gold); letter-spacing:1.2px; }
.live-dot-h { width:5px; height:5px; background:var(--gold); border-radius:50%; animation:live-pulse 1.5s infinite; }
.resets-txt { font-size:11px; color:#6b6b6b; }
.daily-scroll-h { display:flex; gap:10px; overflow-x:auto; scroll-snap-type:x mandatory; margin:0 -18px; padding:2px 18px; }
.daily-scroll-h::-webkit-scrollbar { display:none; }
.daily-card-h { background:#0f0f0f; border-radius:18px; padding:14px; border:1px solid #222; flex-shrink:0; width:158px; scroll-snap-align:start; display:flex; flex-direction:column; gap:10px; position:relative; overflow:hidden; }
.daily-card-h.featured { background:linear-gradient(160deg,#1f1a12,#15110a); border:1px solid rgba(212,168,67,0.35); }
.featured-tag-h { position:absolute; top:10px; right:10px; font-family:'Bebas Neue',sans-serif; font-size:9px; color:var(--gold); letter-spacing:1.5px; }
.daily-dist { font-family:'Bebas Neue',sans-serif; font-size:38px; color:white; line-height:0.9; }
.daily-card-h.featured .daily-dist { color:var(--gold); }
.daily-unit-h { font-size:10px; color:#6b6b6b; font-weight:700; letter-spacing:1.5px; }
.daily-meta-h { font-size:10px; color:#888; font-weight:500; line-height:1.4; }
.daily-meta-h strong { color:var(--gold); font-weight:800; }
.start-btn-h { background:white; color:#0D0D0D; border:none; padding:10px; border-radius:10px; font-family:'Cabinet Grotesk',sans-serif; font-weight:800; font-size:12px; cursor:pointer; width:100%; text-transform:uppercase; }
.daily-card-h.featured .start-btn-h { background:var(--gold); color:#0D0D0D; }
.section-hdr-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.section-h-txt { font-size:20px; color:white; font-weight:800; }
.see-all { font-size:13px; color:var(--gold); font-weight:600; }
.joined-empty-h { background:#1a1a1a; border-radius:18px; padding:18px; border:1px dashed #2a2a2a; text-align:center; color:#6b6b6b; font-size:13px; margin-bottom:16px; }
.bottom-nav-h { position:fixed; bottom:0; left:0; right:0; height:76px; background:rgba(0,0,0,0.97); border-top:1px solid #1a1a1a; display:flex; justify-content:space-around; align-items:flex-start; padding-top:12px; z-index:50; }
.nav-item-h { display:flex; flex-direction:column; align-items:center; gap:4px; color:#555; font-size:11px; font-weight:600; }
.nav-item-h.active { color:var(--gold); }

/* CR CHALLENGE HERO */
.cr-hero {
  position: relative; width: 100%; height: 340px; overflow: hidden;
}
.cr-hero-bg {
  position: absolute; inset: 0;
  background: linear-gradient(160deg, #1A0000 0%, #2D0800 40%, #0D0D0D 100%);
}
.cr-hero-pattern {
  position: absolute; inset: 0; opacity: 0.06;
  background-image: repeating-linear-gradient(45deg, #D32011 0, #D32011 1px, transparent 0, transparent 50%);
  background-size: 20px 20px;
}
.cr-hero-glow {
  position: absolute; top: -80px; right: -40px;
  width: 300px; height: 300px; border-radius: 50%;
  background: radial-gradient(circle, rgba(211,32,17,0.25) 0%, transparent 70%);
  filter: blur(30px);
}
.cr-hero-top {
  position: absolute; top: 52px; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 20px; z-index: 10;
}
.cr-back-btn {
  width: 38px; height: 38px; border-radius: 12px;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.cr-sponsor-chip {
  display: flex; align-items: center; gap: 8px;
  background: rgba(13,13,13,0.7); border: 1px solid rgba(211,32,17,0.4);
  border-radius: 20px; padding: 6px 14px 6px 6px;
}
.cr-sponsor-logo-sm {
  width: 26px; height: 26px; border-radius: 8px; background: var(--cr-red);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 8px; color: white;
  text-align: center; line-height: 1.1; letter-spacing: 0.3px; flex-shrink: 0;
}
.cr-sponsor-name { font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.9); }

.cr-hero-center {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  display: flex; flex-direction: column; align-items: center; z-index: 5;
}
.cr-hero-icon { font-size: 52px; margin-bottom: 8px; filter: drop-shadow(0 0 20px rgba(211,32,17,0.6)); }
.cr-hero-steps {
  font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: white;
  line-height: 0.9; letter-spacing: 2px; text-shadow: 0 0 30px rgba(211,32,17,0.4);
}
.cr-hero-goal { font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 600; margin-top: 4px; letter-spacing: 1px; }

.cr-hero-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 60px 20px 20px;
  background: linear-gradient(to top, #0D0D0D 50%, rgba(13,13,13,0.8) 75%, transparent 100%);
  z-index: 6;
}
.cr-challenge-name { font-weight: 900; font-size: 22px; color: white; line-height: 1.1; margin-bottom: 8px; }
.cr-chips { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.cr-chip {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7);
}
.cr-chip.red { background: rgba(211,32,17,0.2); border-color: rgba(211,32,17,0.4); color: #FF6B5B; }

/* CHALLENGE BODY */
.ch-body { padding: 16px 16px 110px; }
.ch-rank-card {
  background: #1A1A1A; border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px; padding: 16px; margin-bottom: 12px;
  display: flex; align-items: center; position: relative; overflow: hidden;
}
.ch-rank-card::before { content:''; position:absolute; top:0; left:0; bottom:0; width:4px; background:var(--cr-red); border-radius:4px 0 0 4px; }
.ch-rank-num { font-weight:900; font-size:42px; color:var(--cr-red); line-height:1; letter-spacing:-2px; }
.ch-rank-sub { font-size:12px; color:rgba(255,255,255,0.4); margin-top:2px; }
.ch-rank-eye { font-size:10px; font-weight:800; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
.ch-divider { width:1px; height:48px; background:rgba(255,255,255,0.1); margin:0 16px; }
.ch-stat-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px; }
.ch-stat-card { background:#1A1A1A; border:1px solid rgba(255,255,255,0.06); border-radius:14px; padding:12px 8px; text-align:center; }
.ch-sv { font-weight:900; font-size:18px; color:var(--cr-red); line-height:1; margin-bottom:4px; }
.ch-sl { font-size:9px; font-weight:700; color:rgba(255,255,255,0.2); text-transform:uppercase; letter-spacing:0.7px; }

.ch-reward-card {
  background: linear-gradient(135deg, #1A0000 0%, #150000 100%);
  border: 1px solid rgba(211,32,17,0.3); border-radius:20px; padding:18px;
  margin-bottom:12px; display:flex; align-items:center; gap:14px; position:relative; overflow:hidden;
}
.ch-reward-card::after { content:'🍗'; position:absolute; right:16px; top:50%; transform:translateY(-50%); font-size:52px; opacity:0.1; }
.ch-reward-badge { width:48px; height:48px; border-radius:14px; background:rgba(211,32,17,0.15); border:1px solid rgba(211,32,17,0.3); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
.ch-reward-eye { font-size:10px; font-weight:800; color:var(--cr-red); text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; }
.ch-reward-title { font-weight:900; font-size:17px; color:white; line-height:1.1; }
.ch-reward-sub { font-size:12px; color:rgba(255,255,255,0.4); margin-top:3px; }

.ch-cta-btn {
  width:100%; height:58px; background:var(--cr-red); border:none; border-radius:18px;
  font-family:'Cabinet Grotesk',sans-serif; font-weight:900; font-size:17px; color:white;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
  position:relative; overflow:hidden; margin-bottom:12px;
  box-shadow:0 8px 32px rgba(211,32,17,0.3);
}
.ch-cta-btn::before { content:''; position:absolute; top:0; left:-100%; width:60%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent); animation:shimmer 2.4s infinite; }

/* TRACKING */
.tracking-content-h { flex:1; display:flex; flex-direction:column; align-items:center; padding:0 24px 28px; }
.tracking-pill-h { display:inline-flex; align-items:center; gap:8px; background:rgba(211,32,17,0.1); border:1.5px solid var(--cr-red); padding:8px 16px; border-radius:24px; margin-top:8px; margin-bottom:12px; box-shadow:0 0 20px rgba(211,32,17,0.2); }
.tracking-dot-h { width:8px; height:8px; border-radius:50%; background:var(--cr-red); animation:live-pulse 1.5s infinite; }
.tracking-text-h { font-family:'Bebas Neue',sans-serif; color:var(--cr-red); letter-spacing:3px; font-size:14px; }
.goal-pill-h { display:inline-flex; align-items:center; gap:6px; background:#1a1a1a; border:1px solid #2a2a2a; padding:7px 14px; border-radius:20px; margin-bottom:12px; }
.goal-pill-h .gpl { font-size:11px; color:#888; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
.goal-pill-h .gpv { font-family:'Bebas Neue',sans-serif; font-size:14px; color:white; letter-spacing:1.5px; }
.dur-label { font-family:'Bebas Neue',sans-serif; font-size:12px; color:#555; letter-spacing:4px; margin-bottom:6px; }
.dur-time { font-family:'JetBrains Mono',monospace; font-size:48px; color:white; font-weight:500; letter-spacing:-2px; margin-bottom:18px; }
.ring-container-h { position:relative; width:240px; height:240px; display:flex; align-items:center; justify-content:center; margin-bottom:16px; }
.ring-svg-h { position:absolute; width:100%; height:100%; transform:rotate(-90deg); }
.ring-bg-h { fill:none; stroke:#1a1a1a; stroke-width:8; }
.ring-prog-h { fill:none; stroke:var(--cr-red); stroke-width:8; stroke-linecap:round; stroke-dasharray:691.15; stroke-dashoffset:519; transition:stroke-dashoffset 0.3s ease; filter:drop-shadow(0 0 8px rgba(211,32,17,0.5)); }
.steps-content-h { display:flex; flex-direction:column; align-items:center; z-index:2; }
.steps-lbl { font-family:'Bebas Neue',sans-serif; font-size:13px; color:#555; letter-spacing:4px; margin-bottom:4px; }
.steps-num { font-family:'Bebas Neue',sans-serif; font-size:64px; color:var(--cr-red); line-height:0.9; letter-spacing:1px; }
.steps-of-goal-h { font-size:11px; color:#555; font-weight:500; margin-top:6px; }
.stats-row-h { display:flex; gap:10px; margin-bottom:16px; }
.stat-pill-h { background:#0f0f0f; border:1px solid #1f1f1f; padding:9px 14px; border-radius:12px; display:flex; align-items:center; gap:8px; }
.stat-icon-h { color:#888; }
.stat-val { font-size:15px; color:white; font-weight:700; }
.stat-unit-h { font-size:10px; color:#888; }
.pause-btn-h { background:var(--cr-red); color:white; border:none; padding:16px; border-radius:16px; font-family:'Cabinet Grotesk',sans-serif; font-weight:800; font-size:16px; cursor:pointer; width:100%; max-width:340px; display:flex; align-items:center; justify-content:center; gap:10px; box-shadow:0 10px 30px rgba(211,32,17,0.3); margin-top:auto; }

<body>
<div id="app">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="screen"></div>
  <div id="tap-hint">TAP ANYWHERE TO CONTINUE</div>
</div>

<script>
const CR_LOGO = `<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><rect width="56" height="56" rx="12" fill="#D32011"/><text x="28" y="22" font-family="Arial Black,sans-serif" font-size="8" font-weight="900" fill="white" text-anchor="middle">CHICKEN</text><text x="28" y="33" font-family="Arial Black,sans-serif" font-size="8" font-weight="900" fill="white" text-anchor="middle">REPUBLIC</text><text x="28" y="46" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle">&#127829;</text></svg>`;

const DOER_LOGO = `<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><rect width="56" height="56" rx="12" fill="#0D0D0D"/><circle cx="28" cy="16" r="6" fill="#D4A843"/><path d="M22,24 L16,46 M22,24 L28,40 L34,24 M34,24 L40,46" stroke="#D4A843" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M18,33 L22,30 M38,33 L34,30" stroke="#D4A843" stroke-width="3.5" fill="none" stroke-linecap="round"/></svg>`;

const SCREENS = [
  { id: 'disclaimer', type: 'disclaimer' },
  { id: 'home', type: 'app', nav: 'home' },
  { id: 'challenge', type: 'app', nav: 'challenges' },
  { id: 'join', type: 'app', nav: 'challenges' },
  { id: 'tracking', type: 'app', nav: 'challenges' },
  { id: 'leaderboard', type: 'app', nav: 'challenges' },
  { id: 'completion', type: 'app', nav: 'challenges' },
  { id: 'reward_popup', type: 'reward_popup' },
  { id: 'rewards', type: 'app', nav: 'rewards' },
  { id: 'reward_detail', type: 'app', nav: 'rewards' },
  { id: 'qr', type: 'qr' },
  { id: 'brand_dashboard', type: 'app', nav: 'home' },
  { id: 'cta', type: 'cta' }
];

const INSIGHTS = {
  disclaimer: {
    eyebrow: 'WHAT YOU ARE ABOUT TO SEE',
    body: 'This demo was built <strong>specifically for Chicken Republic</strong> to show exactly how a Doer challenge campaign would look and feel for your customers. Every screen, every reward, every data point is tailored to your brand.'
  },
  home: {
    eyebrow: 'THIS IS YOUR REAL ESTATE',
    body: 'The overview card at the top of every user\'s home screen is the most valuable space in the app. <strong>Chicken Republic owns that card</strong> for the full 7 days of the campaign. No other brand is there.'
  },
  challenge: {
    eyebrow: 'WHAT THIS PAGE COSTS ON INSTAGRAM',
    body: 'A sponsored post gets 2 seconds of attention before users scroll. <strong>This page gets opened multiple times a day for 7 days straight.</strong> 12,440 people checking their rank, their steps, their prize — all branded Chicken Republic.'
  },
  join: {
    eyebrow: 'THE MOMENT THEY COMMIT',
    body: 'When a user joins, they make a <strong>personal commitment to walk for your brand</strong>. They are not clicking a banner ad. They are signing up to earn a Chicken Republic Refuel Meal through effort. That is a different kind of attention.'
  },
  tracking: {
    eyebrow: 'WALKING FOR YOUR BRAND',
    body: 'Every step this user takes, <strong>Chicken Republic is the reason</strong>. This screen is open for minutes at a time, multiple times a day. No ad placement on earth gives you that kind of daily active time.'
  },
  leaderboard: {
    eyebrow: 'COMPETITION DRIVES OBSESSION',
    body: 'Users check this leaderboard <strong>multiple times a day</strong> to see if they are still in the top 100. Every check is a reminder that a Chicken Republic Refuel Meal is the prize. Your brand becomes the goal.'
  },
  completion: {
    eyebrow: 'THE MOMENT OF ACHIEVEMENT',
    body: 'This user just walked 35,000 steps. They are proud — and <strong>Chicken Republic gave them that feeling</strong>. That emotional connection is something no billboard or Instagram post can manufacture.'
  },
  reward_popup: {
    eyebrow: 'THE REWARD DELIVERY',
    body: 'The reward triggers automatically. No coupon hunting, no lost codes. <strong>Chicken Republic delivers on its promise instantly</strong>. This is the moment users become loyal customers — earned, not bought.'
  },
  rewards: {
    eyebrow: 'THE REWARDS TAB',
    body: 'Users see their earned Chicken Republic reward sitting here, ready to claim. <strong>Other brands are locked and greyed out</strong> — Chicken Republic stands alone as the reward they actually won. That is brand dominance.'
  },
  reward_detail: {
    eyebrow: 'ONE CLICK FROM YOUR STORE',
    body: 'The user is one tap from walking into a Chicken Republic outlet or placing a delivery order. <strong>This is verified, earned foot traffic</strong> — not impressions, not views. Real people, motivated to visit.'
  },
  qr: {
    eyebrow: 'IN-STORE OR DELIVERY',
    body: 'The QR code works in any of Chicken Republic\'s <strong>190+ outlets nationwide</strong>, or on your delivery platform. Every redemption is tracked. You know exactly who came in, when, and because of which challenge.'
  },
  brand_dashboard: {
    eyebrow: 'YOUR REAL-TIME DASHBOARD',
    body: 'This is what Chicken Republic sees during a live campaign. <strong>Steps walked, daily engagement, rewards claimed, cost per active user</strong>. Every metric tied to real human behaviour — not estimated reach or CPM.'
  }
};

let idx = 0;
let insightSeen = {};
let _activeTimerInt = null;
let _activeStepInt = null;
function _clearIntervals() {
  if (_activeTimerInt) { clearInterval(_activeTimerInt); _activeTimerInt = null; }
  if (_activeStepInt) { clearInterval(_activeStepInt); _activeStepInt = null; }
}

function updateProgress() {
  document.getElementById('progress-fill').style.width = (((idx + 1) / SCREENS.length) * 100) + '%';
}

function showInsight(screenId) {
  if (insightSeen[screenId] || !INSIGHTS[screenId]) return;
  insightSeen[screenId] = true;
  const ins = INSIGHTS[screenId];
  const overlay = document.createElement('div');
  overlay.id = 'insight-overlay';
  overlay.innerHTML = `
    <div class="insight-card">
      <div class="insight-brand-bar">
        <div class="insight-cr-badge">CR</div>
        <div class="insight-x">×</div>
        <div class="insight-doer-badge">DOER</div>
      </div>
      <div class="insight-eyebrow">${ins.eyebrow}</div>
      <div class="insight-body">${ins.body}</div>
      <button class="insight-btn" id="insightClose">GOT IT, SHOW ME</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('insightClose').addEventListener('click', e => {
    e.stopPropagation();
    overlay.remove();
  });
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.remove();
  });
}

function render() {
  _clearIntervals();
  updateProgress();
  const s = SCREENS[idx];
  const screen = document.getElementById('screen');
  const hint = document.getElementById('tap-hint');
  hint.style.display = ['qr','cta','reward_popup'].includes(s.id) ? 'none' : 'block';

  if (s.type === 'disclaimer') screen.innerHTML = renderDisclaimer();
  else if (s.type === 'qr') screen.innerHTML = renderQR();
  else if (s.type === 'reward_popup') screen.innerHTML = renderRewardPopup();
  else if (s.type === 'cta') screen.innerHTML = renderCTA();
  else if (s.type === 'phase') screen.innerHTML = renderPhase(s.text);
  else if (s.type === 'app') screen.innerHTML = renderApp(s.id, s.nav);

  const replay = document.getElementById('replayBtn');
  if (replay) replay.addEventListener('click', e => { e.stopPropagation(); idx = 0; insightSeen = {}; render(); });

  if (s.id === 'tracking') initTracking();

  setTimeout(() => showInsight(s.id), 500);
}

function initTracking() {
  var running = false, secs = 0, tInt = null, sInt = null, steps = 0;
  var TARGET = 35241, CIRC = 691.15;
  var btn = document.getElementById('startTrackingBtn');
  var lbl = document.getElementById('startBtnLabel');
  var ico = document.getElementById('startBtnIcon');
  if (!btn) return;
  function start() {
    running = true;
    ico.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
    lbl.textContent = 'Pause';
    _activeTimerInt = tInt = setInterval(() => {
      secs++;
      var h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),sc=secs%60;
      var d=document.getElementById('timer-display');
      if(d) d.textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');
    }, 1000);
    _activeStepInt = sInt = setInterval(() => {
      if(steps>=TARGET){clearInterval(sInt);return;}
      steps=Math.min(steps+3+Math.floor(Math.random()*3),TARGET);
      var sd=document.getElementById('step-display'); if(sd) sd.textContent=steps.toLocaleString();
      var spd=document.getElementById('speed-display'); if(spd) spd.textContent=['3.2','3.5','3.8','4.1','4.4','3.9'][Math.floor(Math.random()*6)];
      var ring=document.getElementById('ringProgress'); if(ring) ring.style.strokeDashoffset=CIRC*(1-Math.min(steps/TARGET,1));
      var dist=document.getElementById('dist-display'); if(dist) dist.textContent=(steps*0.00078).toFixed(1);
    }, 800);
  }
  btn.addEventListener('click', e => {
    e.stopPropagation();
    if(running){running=false;clearInterval(tInt);clearInterval(sInt);ico.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';lbl.textContent='Resume';}
    else start();
  });
  var ff=document.getElementById('fastForwardBtn');
  if(ff) ff.addEventListener('click',e=>{e.stopPropagation();_clearIntervals();next();});
  setTimeout(()=>{if(document.getElementById('startTrackingBtn')&&!running)start();},600);
}

function next() { if(idx<SCREENS.length-1){idx++;render();} }
function prev() { if(idx>0){idx--;render();} }
document.addEventListener('click', e => { if(!e.target.closest('#replayBtn')&&!e.target.closest('#insight-overlay')) next(); });
document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  if(e.key==='ArrowLeft'){e.preventDefault();prev();}
  if(e.key==='r'||e.key==='R'){idx=0;insightSeen={};render();}
});

function renderApp(screenId, activeNav) {
  const body = APP_SCREENS[screenId]();

function renderNav(active) {
  const items=[{id:'home',icon:'🏠',label:'Home'},{id:'groups',icon:'👥',label:'Groups'},{id:'tracking',icon:'📊',label:'Tracking'},{id:'challenges',icon:'🏁',label:'Challenges'},{id:'profile',icon:'👤',label:'Profile'}];
