<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Doer — Interactive Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  @import url('https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@500,700,800,900&display=swap');
  :root { --bg:#0D0D0D;--cream:#F0EBE1;--gold:#D4A843;--card:#1A1A1A;--card2:#161616;--border:#2A2A2A;--body:#C5BFB2;--muted:#8A8376;--cr-red:#D32011;--rea-col:#F97316;--nnpc-col:#16A34A; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--cream);font-family:'Cabinet Grotesk',-apple-system,sans-serif;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;}
  #progress-bar{position:fixed;top:0;left:0;right:0;height:2px;background:#1A1A1A;z-index:200;}
  #progress-fill{height:100%;background:var(--gold);transition:width 0.3s ease;}
  #tap-hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:3px;color:var(--muted);z-index:200;animation:fade-pulse 2s infinite;white-space:nowrap;}
  @keyframes fade-pulse{0%,100%{opacity:0.3;}50%{opacity:0.9;}}
  #screen{position:fixed;inset:0;overflow:hidden;}
  .scroll-body{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:60px;}
  .scroll-body::-webkit-scrollbar{display:none;}
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 6px;font-size:12px;font-weight:700;color:var(--cream);background:var(--bg);position:sticky;top:0;z-index:10;}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,13,0.97);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 18px;z-index:50;}
  .nav-item{display:flex;flex-direction:column;align-items:center;font-size:10px;color:var(--muted);gap:3px;}
  .nav-item.active{color:var(--gold);}
  .nav-item .icon{font-size:20px;}
  .cta-btn{width:100%;padding:16px;background:var(--gold);color:var(--bg);border:none;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;animation:pulse-glow 2s infinite;display:flex;align-items:center;justify-content:center;gap:8px;}
  .cta-btn .arr{animation:nudge 1.2s infinite;display:inline-block;}
  @keyframes pulse-glow{0%,100%{box-shadow:0 0 0 0 rgba(212,168,67,0.7),0 0 20px rgba(212,168,67,0.25);}50%{box-shadow:0 0 0 10px rgba(212,168,67,0),0 0 30px rgba(212,168,67,0.5);}}
  @keyframes nudge{0%,100%{transform:translateX(0);}50%{transform:translateX(5px);}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;}
  .lbl{font-size:10px;letter-spacing:2px;color:var(--muted);font-weight:700;margin-bottom:6px;}
  .stat-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 6px;text-align:center;}
  .stat-block .icon{font-size:18px;margin-bottom:4px;}
  .stat-block .val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--cream);line-height:1;}
  .stat-block .slbl{font-size:9px;letter-spacing:1px;color:var(--muted);margin-top:3px;}
  .detail-list{background:var(--card);border:1px solid var(--border);border-radius:14px;}
  .detail-row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);font-size:13px;}
  .detail-row:last-child{border-bottom:none;}
  .detail-row .dl{color:var(--muted);font-size:11px;letter-spacing:1px;text-transform:uppercase;}
  .detail-row .dr{color:var(--cream);font-weight:600;text-align:right;}
  .phase-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 30px;}
  .phase-screen .gold-line{width:50px;height:2px;background:var(--gold);margin:0 auto 28px;position:relative;z-index:2;}
  .phase-screen .gold-line.bot{margin:28px auto 0;}
  .phase-screen h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,7vw,40px);line-height:1.1;color:var(--cream);max-width:340px;position:relative;z-index:2;}
  .phase-screen .tap-label{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:3px;color:var(--muted);animation:fade-pulse 2s infinite;z-index:2;white-space:nowrap;}
  .qr-full{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;text-align:center;overflow-y:auto;}
  .qr-full .brand-label{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:4px;color:rgba(255,255,255,0.85);margin-bottom:8px;}
  .qr-full h1{font-family:'Bebas Neue',sans-serif;font-size:52px;color:#fff;line-height:0.95;letter-spacing:1px;margin-bottom:4px;}
  .qr-full .combo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:rgba(255,255,255,0.9);margin-bottom:24px;}
  .qr-box{width:200px;height:200px;background:#fff;border-radius:16px;padding:16px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;}
  .qr-box svg{width:100%;height:100%;}
  .qr-code-text{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:8px;color:#fff;margin-bottom:14px;}
  .qr-instruction{font-size:13px;color:rgba(255,255,255,0.9);line-height:1.5;margin-bottom:16px;max-width:280px;}
  .qr-tags{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
  .qr-tag{background:rgba(0,0,0,0.3);padding:5px 12px;border-radius:20px;font-size:11px;color:#fff;}
  .qr-timer{background:rgba(0,0,0,0.4);border:2px solid rgba(255,255,255,0.3);border-radius:14px;padding:16px 28px;text-align:center;}
  .qr-timer .tl{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.7);}
  .qr-timer .tv{font-family:'Bebas Neue',sans-serif;font-size:40px;color:#fff;letter-spacing:3px;margin-top:2px;}
  .qr-tap-hint{margin-top:24px;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.4);animation:fade-pulse 2s infinite;}
  .join-wrap{display:flex;flex-direction:column;align-items:center;text-align:center;padding:30px 20px 20px;}
  .join-check{width:74px;height:74px;border-radius:50%;background:rgba(74,222,128,0.15);border:2px solid #4ADE80;display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:18px;}
  .join-wrap h2{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:1px;color:var(--cream);margin-bottom:10px;}
  .join-wrap .sub{font-size:14px;color:var(--body);line-height:1.55;max-width:290px;margin-bottom:24px;}
  .lb-hero{background:var(--card);border:1px solid var(--gold);border-radius:14px;padding:14px 16px;text-align:center;margin-bottom:12px;}
  .lb-hero .lt{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold);}
  .lb-hero .ls{font-size:11px;color:var(--muted);margin-top:4px;}
  .tab-row{display:flex;gap:6px;margin-bottom:12px;}
  .tab{flex:1;padding:8px 0;background:var(--card);border:1px solid var(--border);border-radius:8px;text-align:center;font-size:10px;letter-spacing:1px;color:var(--muted);}
  .tab.active{background:rgba(212,168,67,0.12);border-color:var(--gold);color:var(--gold);}
  .lb-list{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;}
  .lb-row{display:flex;gap:10px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);}
  .lb-row:last-child{border-bottom:none;}
  .lb-row.you{background:rgba(212,168,67,0.08);border-radius:8px;}
  .lb-rank{width:28px;font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--gold);text-align:center;flex-shrink:0;}
  .lb-av{width:32px;height:32px;border-radius:50%;background:#444;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--cream);flex-shrink:0;}
  .lb-av.gold{background:var(--gold);color:var(--bg);}
  .lb-av.silver{background:#A0A0A0;color:var(--bg);}
  .lb-av.bronze{background:#B8733D;color:var(--bg);}
  .lb-name{flex:1;font-size:13px;color:var(--cream);}
  .lb-name .you-tag{font-size:9px;color:var(--gold);margin-left:4px;letter-spacing:1px;}
  .lb-steps{text-align:right;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--cream);letter-spacing:1px;}
  .lb-steps .sub{font-size:9px;color:var(--muted);display:block;letter-spacing:0;}
  .completion-wrap{display:flex;flex-direction:column;align-items:center;text-align:center;padding:24px 20px 20px;}
  .trophy-anim{font-size:64px;margin-bottom:10px;animation:float-trophy 2s ease-in-out infinite;}
  @keyframes float-trophy{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .completion-wrap .clbl{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:5px;color:var(--gold);margin-bottom:8px;}
  .completion-wrap h2{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--cream);line-height:1;letter-spacing:1px;margin-bottom:12px;}
  .completion-wrap .cnote{font-size:14px;color:var(--body);line-height:1.5;max-width:290px;margin-bottom:24px;}
  .comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;margin-bottom:24px;}
  .comp-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 12px;}
  .comp-block .cn{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--cream);line-height:1;}
  .comp-block .cl{font-size:9px;letter-spacing:1px;color:var(--muted);margin-top:5px;}
  .reward-detail-hero{background:linear-gradient(150deg,var(--cr-red) 0%,#7A100A 100%);padding:28px 20px 24px;text-align:center;position:relative;overflow:hidden;}
  .reward-detail-hero .bp{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:4px;color:rgba(255,255,255,0.85);margin-bottom:8px;}
  .reward-detail-hero .rn{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#fff;line-height:0.95;letter-spacing:1px;}
  .warning-box{background:rgba(212,168,67,0.08);border:1px solid rgba(212,168,67,0.3);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start;}
  .warning-box .wi{font-size:20px;flex-shrink:0;}
  .warning-box .wt{font-size:12px;color:var(--body);line-height:1.55;}
  .warning-box .wt strong{color:var(--gold);}
  .ch2-hero{position:relative;width:100%;height:320px;overflow:hidden;}
  .ch2-hero-grain{position:absolute;inset:0;opacity:0.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-size:128px 128px;}
  .ch2-hero-arc{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);width:340px;height:340px;}
  .ch2-hero-orb{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:280px;height:280px;border-radius:50%;filter:blur(20px);}
  .ch2-hero-top{position:absolute;top:52px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 20px;z-index:10;}
  .ch2-back-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);cursor:pointer;}
  .ch2-sponsor-chip{display:flex;align-items:center;gap:8px;background:rgba(13,13,13,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:7px 14px 7px 7px;backdrop-filter:blur(16px);}
  .ch2-sponsor-avatar{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#D32011,#7A100A);display:flex;align-items:center;justify-content:center;font-size:14px;}
  .ch2-sponsor-text{font-size:12px;font-weight:800;color:rgba(255,255,255,0.9);}
  .ch2-ring-wrap{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;z-index:5;}
  .ch2-ring-svg{width:160px;height:160px;}
  .ch2-ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
  .ch2-ring-steps{font-weight:900;font-size:28px;color:white;line-height:1;letter-spacing:-1px;}
  .ch2-ring-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .ch2-ring-goal{font-size:11px;font-weight:700;color:var(--gold);margin-top:6px;}
  .ch2-hero-bottom{position:absolute;bottom:0;left:0;right:0;padding:48px 20px 20px;background:linear-gradient(to top,#0D0D0D 55%,rgba(13,13,13,0.7) 80%,transparent 100%);z-index:6;}
  .ch2-challenge-name{font-weight:900;font-size:24px;color:#FFF;line-height:1.0;letter-spacing:-0.5px;margin-bottom:8px;}
  .ch2-chips{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .ch2-chip{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.75);}
  .ch2-chip.gold{background:rgba(212,168,67,0.2);border-color:rgba(212,168,67,0.4);color:var(--gold);}
  .ch2-body{padding:16px 16px 110px;}
  .ch2-rank-spotlight{background:#1A1A1A;border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:16px;margin-bottom:12px;display:flex;align-items:center;overflow:hidden;position:relative;}
  .ch2-rank-spotlight::before{content:"";position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--gold);border-radius:4px 0 0 4px;}
  .ch2-rank-main{flex:1;padding-left:12px;}
  .ch2-rank-eyebrow{font-size:10px;font-weight:800;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
  .ch2-rank-number{font-weight:900;font-size:42px;color:var(--gold);line-height:1;letter-spacing:-2px;}
  .ch2-rank-sub{font-size:12px;font-weight:600;color:rgba(255,255,255,0.4);margin-top:2px;}
  .ch2-rank-divider{width:1px;height:48px;background:rgba(255,255,255,0.1);margin:0 16px;}
  .ch2-rank-right{text-align:right;}
  .ch2-stat-val{font-weight:900;font-size:20px;color:white;line-height:1;}
  .ch2-stat-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.2);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;}
  .ch2-stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
  .ch2-stat-card{background:#1A1A1A;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:12px 8px;text-align:center;}
  .ch2-sv{font-weight:900;font-size:18px;color:var(--gold);line-height:1;margin-bottom:4px;}
  .ch2-sl{font-size:9px;font-weight:700;color:rgba(255,255,255,0.2);text-transform:uppercase;letter-spacing:0.7px;}
  .ch2-reward-card{background:linear-gradient(135deg,#1C1608 0%,#181208 100%);border:1px solid rgba(212,168,67,0.22);border-radius:20px;padding:18px;margin-bottom:12px;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;}
  .ch2-reward-card::after{content:"F3C6";position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:52px;opacity:0.08;}
  .ch2-reward-badge{width:48px;height:48px;border-radius:14px;background:rgba(212,168,67,0.12);border:1px solid rgba(212,168,67,0.22);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
  .ch2-reward-eyebrow{font-size:10px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
  .ch2-reward-title{font-weight:900;font-size:17px;color:white;line-height:1.1;}
  .ch2-reward-sub{font-size:12px;font-weight:500;color:rgba(255,255,255,0.4);margin-top:3px;}
  .ch2-cta-btn{width:100%;height:58px;background:var(--gold);border:none;border-radius:18px;font-family:'Cabinet Grotesk',sans-serif;font-weight:900;font-size:17px;color:#0D0D0D;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(212,168,67,0.25);margin-bottom:12px;}
  .ch2-cta-btn::before{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);animation:shimmer2 2.4s infinite;}
  @keyframes shimmer2{0%{left:-100%;}100%{left:200%;}}
  .ch2-tab-nav{display:flex;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:16px;}
  .ch2-tab{flex:1;text-align:center;padding:12px 0;font-size:13px;font-weight:800;color:rgba(255,255,255,0.2);position:relative;cursor:pointer;}
  .ch2-tab.active{color:var(--gold);}
  .ch2-tab.active::after{content:"";position:absolute;bottom:-1px;left:25%;right:25%;height:2px;background:var(--gold);border-radius:2px;}
  .ch2-desc-block{background:#1A1A1A;border:1px solid rgba(255,255,255,0.06);border-radius:18px;padding:18px;margin-bottom:12px;}
  .ch2-desc-text{font-size:13px;font-weight:500;color:rgba(255,255,255,0.6);line-height:1.65;}
  .ch2-detail-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .ch2-detail-tile{background:#1A1A1A;border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:14px 16px;}
  .ch2-dt-label{font-size:10px;font-weight:800;color:rgba(255,255,255,0.2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
  .ch2-dt-value{font-size:14px;font-weight:900;color:white;}
  .live-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;letter-spacing:2px;color:#4ADE80;font-weight:700;margin-left:auto;}
  .live-dot{width:6px;height:6px;background:#4ADE80;border-radius:50%;animation:live-pulse 1.5s infinite;}
  @keyframes live-pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .battle-sponsor-bar{display:flex;align-items:center;gap:10px;padding:8px 20px;background:var(--card);border-bottom:1px solid var(--border);}
  .battle-sponsor-bar .slbl{font-size:10px;letter-spacing:1px;color:var(--muted);}
  .battle-sponsor-bar .sname{font-size:12px;font-weight:700;color:var(--cream);}
  .battle-title{text-align:center;padding:14px 20px 10px;}
  .battle-title h2{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--cream);letter-spacing:1px;margin-bottom:4px;}
  .battle-title .bsub{font-size:11px;color:var(--muted);line-height:1.4;max-width:300px;margin:0 auto;}
  .your-contrib{background:linear-gradient(135deg,rgba(212,168,67,0.15),rgba(212,168,67,0.05));border:1px solid rgba(212,168,67,0.4);border-radius:14px;padding:12px 14px;margin:0 20px 12px;display:flex;gap:12px;align-items:center;}
  .your-contrib .yav{width:36px;height:36px;background:var(--gold);color:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;flex-shrink:0;}
  .your-contrib .yt{flex:1;}
  .your-contrib .yt .ytop{font-size:9px;letter-spacing:2px;color:var(--gold);font-weight:700;}
  .your-contrib .yt .ybot{font-size:12px;color:var(--cream);margin-top:3px;line-height:1.35;}
  .your-contrib .yt .ybot strong{color:var(--gold);}
  .vs-panel{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:16px;margin:0 20px 12px;}
  .vs-teams-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:14px;}
  .team-block{text-align:center;}

let idx = 0;

function _clearTrackingIntervals() {
  if (_activeTimerInt) { clearInterval(_activeTimerInt); _activeTimerInt = null; }
  if (_activeStepInt) { clearInterval(_activeStepInt); _activeStepInt = null; }
}

function updateProgress() {
  const pct = ((idx + 1) / SCREENS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function render() {
  _clearTrackingIntervals();
  updateProgress();
  const s = SCREENS[idx];
  const screen = document.getElementById('screen');
  const hint = document.getElementById('tap-hint');
  hint.style.display = ['qr','cta','reward_popup','closing_insight'].includes(s.id) ? 'none' : 'block';
  if (s.type === 'disclaimer') screen.innerHTML = renderDisclaimer();
  else if (s.type === 'qr') screen.innerHTML = renderQR();
  else if (s.type === 'reward_popup') screen.innerHTML = renderRewardPopup();
  else if (s.type === 'closing_insight') screen.innerHTML = renderClosingInsight();
  else if (s.type === 'cta') screen.innerHTML = renderCTA();
  else if (s.type === 'phase') screen.innerHTML = renderPhase(s.text);
  else if (s.type === 'app') screen.innerHTML = renderApp(s.id, s.nav);
  const replay = document.getElementById('replayBtn');
  if (replay) replay.addEventListener('click', e => { e.stopPropagation(); idx = 0; render(); });
  if (s.id === 'tracking') initTracking();
}

function initTracking() {
  var timerRunning = false, timerSecs = 0, timerInt = null, stepInt = null;
  var currentSteps = 0, TARGET = 35241, CIRC = 691.15;
  var btn = document.getElementById('startTrackingBtn');
  var lbl = document.getElementById('startBtnLabel');
  var ico = document.getElementById('startBtnIcon');
  if (!btn) return;
  function startTimer() {
    timerRunning = true;
    ico.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
    lbl.textContent = 'Pause';
    _activeTimerInt = timerInt = setInterval(function() {
      timerSecs++;
      var h=Math.floor(timerSecs/3600), m=Math.floor((timerSecs%3600)/60), sc=timerSecs%60;
      var d=document.getElementById('timer-display');
      if(d) d.textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');
    }, 1000);
    _activeStepInt = stepInt = setInterval(function() {
      if(currentSteps>=TARGET){clearInterval(stepInt);return;}
      currentSteps=Math.min(currentSteps+3+Math.floor(Math.random()*3),TARGET);
      var sd=document.getElementById('step-display'); if(sd) sd.textContent=currentSteps.toLocaleString();
      var spd=document.getElementById('speed-display'); if(spd) spd.textContent=['3.2','3.5','3.8','4.1','4.4','3.9'][Math.floor(Math.random()*6)];
      var ring=document.getElementById('ringProgress'); if(ring) ring.style.strokeDashoffset=CIRC*(1-Math.min(currentSteps/TARGET,1));
      var dist=document.getElementById('dist-display'); if(dist) dist.textContent=(currentSteps*0.00078).toFixed(1);
    }, 800);
  }
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    if(timerRunning){
      timerRunning=false; clearInterval(timerInt); clearInterval(stepInt);
      ico.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>';
      lbl.textContent='Resume';
    } else { startTimer(); }
  });
  var ff=document.getElementById('fastForwardBtn');
  if(ff) ff.addEventListener('click',function(e){e.stopPropagation();_clearTrackingIntervals();next();});
  setTimeout(function(){if(document.getElementById('startTrackingBtn')&&!timerRunning) startTimer();},600);
}

function next() { if (idx < SCREENS.length-1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
document.addEventListener('click', e => { if (!e.target.closest('#replayBtn')) next(); });
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); next(); }
  if (e.key==='ArrowLeft') { e.preventDefault(); prev(); }
  if (e.key==='r'||e.key==='R') { idx=0; render(); }
});
